<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Мой стартап — AI Чат</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-hover: #222633;
      --border: #2e3345;
      --text: #e8eaf0;
      --text-muted: #8b90a5;
      --accent: #6c63ff;
      --accent-hover: #5a52e0;
      --user-bubble: #2d3250;
      --ai-bubble: #1e2235;
      --danger: #ff6b6b;
      --radius: 14px;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.15rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    header h1 span {
      color: var(--accent);
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
      transition: background 0.3s;
    }

    .status-dot.offline { background: var(--danger); }
    .status-dot.loading { background: #facc15; animation: pulse 1s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    #chat::-webkit-scrollbar { width: 6px; }
    #chat::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 75%;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user { align-self: flex-end; }
    .message.ai { align-self: flex-start; }

    .message-label {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-bottom: 4px;
      padding: 0 4px;
    }

    .message.user .message-label { text-align: right; }

    .bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      line-height: 1.55;
      font-size: 0.95rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user .bubble {
      background: var(--user-bubble);
      border-bottom-right-radius: 4px;
    }

    .message.ai .bubble {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .typing .bubble {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 14px 20px;
    }

    .typing .bubble span {
      width: 7px;
      height: 7px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing .bubble span:nth-child(2) { animation-delay: 0.15s; }
    .typing .bubble span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      gap: 12px;
      text-align: center;
      padding: 40px;
    }

    .empty-state svg {
      width: 48px;
      height: 48px;
      opacity: 0.4;
    }

    .empty-state h2 {
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--text);
    }

    .empty-state p { font-size: 0.85rem; max-width: 320px; }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 8px;
    }

    .suggestion {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    .suggestion:hover {
      background: var(--surface-hover);
      color: var(--text);
      border-color: var(--accent);
    }

    footer {
      padding: 16px 24px 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      max-width: 900px;
      margin: 0 auto;
    }

    #prompt {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
      padding: 12px 16px;
      resize: none;
      min-height: 48px;
      max-height: 160px;
      line-height: 1.5;
      transition: border-color 0.2s;
      outline: none;
    }

    #prompt:focus { border-color: var(--accent); }
    #prompt::placeholder { color: var(--text-muted); }

    #send-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      width: 48px;
      height: 48px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }

    #send-btn:hover:not(:disabled) { background: var(--accent-hover); }
    #send-btn:active:not(:disabled) { transform: scale(0.95); }
    #send-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    #send-btn svg { width: 20px; height: 20px; }

    .error-toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #3b1212;
      border: 1px solid var(--danger);
      color: #fca5a5;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 0.85rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 100;
      max-width: 90%;
      text-align: center;
    }

    .error-toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 600px) {
      header, footer { padding: 12px 16px; }
      #chat { padding: 16px; }
      .message { max-width: 90%; }
    }
  </style>
</head>
<body>

  <header>
    <h1>Мой <span>стартап</span></h1>
    <div class="status">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Подключение…</span>
    </div>
  </header>

  <div id="chat">
    <div class="empty-state" id="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M8 10h8M8 14h5M21 12c0 4.418-4.03 8-9 8a9.86 9.86 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
      </svg>
      <h2>Начните диалог</h2>
      <p>Задайте вопрос нейросети — ответ придёт через API на localhost:8000</p>
      <div class="suggestions">
        <button class="suggestion" data-text="Расскажи коротко о Python">О Python</button>
        <button class="suggestion" data-text="Напиши идею для стартапа">Идея стартапа</button>
        <button class="suggestion" data-text="Объясни, что такое REST API">Что такое REST</button>
      </div>
    </div>
  </div>

  <footer>
    <div class="input-row">
      <textarea
        id="prompt"
        rows="1"
        placeholder="Введите сообщение…"
        autofocus
      ></textarea>
      <button id="send-btn" title="Отправить" disabled>
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
  </footer>

  <div class="error-toast" id="error-toast"></div>

  <script>
    const API_BASE = "http://localhost:8000";

    const chatEl = document.getElementById("chat");
    const emptyState = document.getElementById("empty-state");
    const promptEl = document.getElementById("prompt");
    const sendBtn = document.getElementById("send-btn");
    const statusDot = document.getElementById("status-dot");
    const statusText = document.getElementById("status-text");
    const errorToast = document.getElementById("error-toast");

    let isLoading = false;
    let toastTimer = null;

    function setStatus(state, text) {
      statusDot.className = "status-dot" + (state ? ` ${state}` : "");
      statusText.textContent = text;
    }

    function showError(msg) {
      errorToast.textContent = msg;
      errorToast.classList.add("visible");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => errorToast.classList.remove("visible"), 4000);
    }

    function hideEmptyState() {
      if (emptyState) emptyState.remove();
    }

    function appendMessage(role, text) {
      hideEmptyState();

      const wrap = document.createElement("div");
      wrap.className = `message ${role}`;

      const label = document.createElement("div");
      label.className = "message-label";
      label.textContent = role === "user" ? "Вы" : "AI";

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;

      wrap.append(label, bubble);
      chatEl.appendChild(wrap);
      chatEl.scrollTop = chatEl.scrollHeight;
      return wrap;
    }

    function showTyping() {
      hideEmptyState();
      const wrap = document.createElement("div");
      wrap.className = "message ai typing";
      wrap.id = "typing-indicator";

      const label = document.createElement("div");
      label.className = "message-label";
      label.textContent = "AI";

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.innerHTML = "<span></span><span></span><span></span>";

      wrap.append(label, bubble);
      chatEl.appendChild(wrap);
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    function hideTyping() {
      document.getElementById("typing-indicator")?.remove();
    }

    function autoResize() {
      promptEl.style.height = "auto";
      promptEl.style.height = Math.min(promptEl.scrollHeight, 160) + "px";
    }

    function updateSendBtn() {
      sendBtn.disabled = isLoading || !promptEl.value.trim();
    }

    async function checkApi() {
      try {
        const res = await fetch(`${API_BASE}/requests`, { method: "GET" });
        if (!res.ok) throw new Error();
        setStatus("", "API подключён");
        sendBtn.disabled = !promptEl.value.trim();
        return true;
      } catch {
        setStatus("offline", "API недоступен");
        return false;
      }
    }

    async function loadHistory() {
      try {
        const res = await fetch(`${API_BASE}/requests`);
        if (!res.ok) return;
        const data = await res.json();
        if (!Array.isArray(data) || data.length === 0) return;

        for (const item of data) {
          if (item.prompt) appendMessage("user", item.prompt);
          if (item.response) appendMessage("ai", item.response);
        }
      } catch {
        /* история необязательна */
      }
    }

    async function sendMessage(text) {
      const prompt = text.trim();
      if (!prompt || isLoading) return;

      isLoading = true;
      updateSendBtn();
      appendMessage("user", prompt);
      promptEl.value = "";
      autoResize();
      showTyping();

      try {
        const res = await fetch(`${API_BASE}/requests`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prompt }),
        });

        hideTyping();

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.detail || `Ошибка ${res.status}`);
        }

        const data = await res.json();
        appendMessage("ai", data.answer ?? "Пустой ответ");
        setStatus("", "API подключён");
      } catch (err) {
        hideTyping();
        showError(err.message || "Не удалось получить ответ");
        setStatus("offline", "Ошибка запроса");
      } finally {
        isLoading = false;
        updateSendBtn();
        promptEl.focus();
      }
    }

    sendBtn.addEventListener("click", () => sendMessage(promptEl.value));

    promptEl.addEventListener("input", () => {
      autoResize();
      updateSendBtn();
    });

    promptEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage(promptEl.value);
      }
    });

    document.querySelectorAll(".suggestion").forEach((btn) => {
      btn.addEventListener("click", () => {
        promptEl.value = btn.dataset.text;
        autoResize();
        updateSendBtn();
        sendMessage(btn.dataset.text);
      });
    });

    (async () => {
      setStatus("loading", "Подключение…");
      const ok = await checkApi();
      if (ok) await loadHistory();
      promptEl.focus();
    })();
  </script>
</body>
</html>
